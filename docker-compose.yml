services:
  postgres:
    image: postgres:16
    container_name: amazon-emulator-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: amazon
      POSTGRES_PASSWORD: amazon
      POSTGRES_DB: amazon_emulator
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: amazon-emulator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
